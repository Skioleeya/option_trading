# config/signals/iv_regime.yaml
# IV Regime Engine — classifies IV environment for weight adjustment
# Migrated from: backend/app/services/fusion/dynamic_weight_engine.py

signal_name: "iv_regime"
version: "2.0"
description: "ATM IV level + velocity → regime classification (LOW_VOL / NORMAL / HIGH_VOL)"

inputs:
  - feature: "atm_iv"
    transform: "none"
  - feature: "iv_velocity_1m"
    transform: "none"
  - feature: "net_gex_normalized"
    transform: "none"

parameters:
  # IV level thresholds (annualized)
  iv_low_threshold: 0.12          # ATM IV < 12% → LOW_VOL regime
  iv_high_threshold: 0.25         # ATM IV > 25% → HIGH_VOL regime
  # Velocity amplification
  velocity_weight: 0.3            # how much velocity shifts the raw_value
  # GEX cross-check
  gex_amplification: 0.15         # negative GEX amplifies HIGH_VOL signal
  # Hysteresis (prevents rapid regime switching)
  hysteresis_ticks: 3

output_type: "continuous"         # raw_value in [-1, +1], direction as regime
