# config/signals/trap_detector.yaml
# Trap Detector Signal — spot/option price divergence detection
# Migrated from: backend/app/agents/agent_b.py (AgentB1._update_state)

signal_name: "trap_detector"
version: "2.1"
description: |
  Detects BULL TRAP (price rising + calls fading) and
  BEAR TRAP (price dropping + puts fading) divergences.

inputs:
  - feature: "spot_roc_1m"
    transform: "none"
  # Note: call/put ROC derived internally from chain snapshot
  - feature: "atm_iv"
    transform: "none"

parameters:
  # Entry conditions
  spot_entry_threshold: 0.002     # spot must move ≥0.2% to trigger evaluation
  opt_fade_threshold: -0.001      # option must lose ≥0.1% to confirm trap
  # State machine k-thresholds
  k_entry: 3                      # N consecutive ticks to enter trap state
  k_exit: 2                       # N consecutive ticks to exit trap state
  # Rocket exit: spot acceleration cancels trap
  rocket_exit_pct: 0.05           # if spot ROC > 5%, cancel bear trap (rocket mode)
  # IV regime gate: suppress signals in high-IV chaos
  iv_chaos_threshold: 0.60        # ATM IV > 60% → suppress trap signals
  # Confidence parameters
  confidence_base: 0.70
  confidence_decay_per_tick: 0.05 # decay if k_exit ticks pass without confirmation

output_type: "categorical"        # BULL_TRAP | BEAR_TRAP | IDLE
