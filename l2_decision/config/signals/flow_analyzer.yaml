# config/signals/flow_analyzer.yaml
# Flow Analyzer Signal — DEG-FLOW composite (D+E+G flow engines)
# Migrated from: backend/app/services/flow/deg_composer.py

signal_name: "flow_analyzer"
version: "2.0"
description: "Composite DEG-FLOW z-score: Delta(D) + Entropy(E) + Gamma(G) option flow"

inputs:
  - feature: "net_gex_normalized"
    transform: "none"
  - feature: "vol_accel_ratio"
    transform: "none"
  - feature: "vpin_composite"
    transform: "none"

parameters:
  # Normal session weights (must sum to 1.0)
  weight_d: 0.40
  weight_e: 0.35
  weight_g: 0.25
  # Charm surge zone (last 2h of 0DTE session)
  charm_surge_weight_d: 0.50
  charm_surge_weight_e: 0.30
  charm_surge_weight_g: 0.20
  # NEUTRAL GEX weights
  neutral_gex_weight_d: 0.30
  neutral_gex_weight_e: 0.40
  neutral_gex_weight_g: 0.30
  # Z-score intensity thresholds
  zscore_extreme_threshold: 2.0
  zscore_high_threshold: 1.0
  # Directional threshold
  directional_threshold: 0.1     # |z| > 0.1 to classify as BULL/BEAR

output_type: "continuous"
